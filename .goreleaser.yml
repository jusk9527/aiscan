version: 2

project_name: aiscan

before:
  hooks:
    - go generate ./pkg/scanner/resources

builds:
  - id: aiscan
    main: ./cmd/aiscan
    binary: aiscan
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    tags:
      - forceposix
      - emptytemplates
      - noembed
    ldflags:
      - -s -w

archives:
  - id: aiscan
    ids:
      - aiscan
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  github:
    owner: chainreactors
    name: aiscan
