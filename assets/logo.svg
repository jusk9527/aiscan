<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E59B"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E59B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="scan" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00E59B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00E59B" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Outer ring nodes — 8 satellite nodes in octagon -->
  <!-- Top -->
  <circle cx="256" cy="72" r="18" fill="url(#ring)" stroke="#00E59B" stroke-width="2"/>
  <!-- Top-right -->
  <circle cx="386" cy="126" r="18" fill="url(#ring)" stroke="#00E59B" stroke-width="2"/>
  <!-- Right -->
  <circle cx="440" cy="256" r="18" fill="url(#ring)" stroke="#00E59B" stroke-width="2"/>
  <!-- Bottom-right -->
  <circle cx="386" cy="386" r="18" fill="url(#ring)" stroke="#00E59B" stroke-width="2"/>
  <!-- Bottom -->
  <circle cx="256" cy="440" r="18" fill="url(#ring)" stroke="#00E59B" stroke-width="2"/>
  <!-- Bottom-left -->
  <circle cx="126" cy="386" r="18" fill="url(#ring)" stroke="#00E59B" stroke-width="2"/>
  <!-- Left -->
  <circle cx="72" cy="256" r="18" fill="url(#ring)" stroke="#00E59B" stroke-width="2"/>
  <!-- Top-left -->
  <circle cx="126" cy="126" r="18" fill="url(#ring)" stroke="#00E59B" stroke-width="2"/>

  <!-- Connection lines from center to satellites -->
  <g stroke="#00E59B" stroke-width="1.5" opacity="0.35">
    <line x1="256" y1="256" x2="256" y2="72"/>
    <line x1="256" y1="256" x2="386" y2="126"/>
    <line x1="256" y1="256" x2="440" y2="256"/>
    <line x1="256" y1="256" x2="386" y2="386"/>
    <line x1="256" y1="256" x2="256" y2="440"/>
    <line x1="256" y1="256" x2="126" y2="386"/>
    <line x1="256" y1="256" x2="72" y2="256"/>
    <line x1="256" y1="256" x2="126" y2="126"/>
  </g>

  <!-- Cross-links between adjacent satellites -->
  <g stroke="#00B4D8" stroke-width="1" opacity="0.2">
    <line x1="256" y1="72" x2="386" y2="126"/>
    <line x1="386" y1="126" x2="440" y2="256"/>
    <line x1="440" y1="256" x2="386" y2="386"/>
    <line x1="386" y1="386" x2="256" y2="440"/>
    <line x1="256" y1="440" x2="126" y2="386"/>
    <line x1="126" y1="386" x2="72" y2="256"/>
    <line x1="72" y1="256" x2="126" y2="126"/>
    <line x1="126" y1="126" x2="256" y2="72"/>
  </g>

  <!-- Scan sweep arc — radar-like effect -->
  <path d="M256,256 L256,100 A156,156 0 0,1 366,166 Z" fill="url(#scan)" opacity="0.15"/>

  <!-- Center core — AI brain node -->
  <circle cx="256" cy="256" r="52" fill="#0D1117" stroke="url(#core)" stroke-width="3"/>
  <circle cx="256" cy="256" r="38" fill="none" stroke="#00E59B" stroke-width="1" opacity="0.3"/>

  <!-- AI symbol inside core -->
  <text x="256" y="265" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="28" font-weight="700" fill="url(#core)">AI</text>

  <!-- Pulse rings -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="#00E59B" stroke-width="1" opacity="0.12"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#00E59B" stroke-width="0.8" opacity="0.08"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#00B4D8" stroke-width="0.6" opacity="0.05"/>
</svg>
