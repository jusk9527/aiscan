name: goreleaser

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v1.2.3'
        required: true
        type: string
      target:
        description: 'Branch or commit to tag if the tag does not exist'
        required: false
        default: master
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  goreleaser:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target || github.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Prepare release tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
            TARGET="${{ inputs.target }}"
          else
            TAG="${GITHUB_REF_NAME}"
            TARGET="${GITHUB_SHA}"
          fi

          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release tag: ${TAG}" >&2
            exit 1
          fi

          if [[ "${TAG}" == *nightly* ]]; then
            echo "Nightly tags must be released by nightly.yml: ${TAG}" >&2
            exit 1
          fi

          git fetch --force --tags origin

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            git checkout --force "refs/tags/${TAG}"
          else
            if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]]; then
              echo "Tag ${TAG} was expected to exist for a tag push event" >&2
              exit 1
            fi

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout --force "${TARGET}"
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "refs/tags/${TAG}"
          fi

          echo "RELEASE_TAG=${TAG}" >> "${GITHUB_ENV}"
          echo "GORELEASER_CURRENT_TAG=${TAG}" >> "${GITHUB_ENV}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install upx
        run: sudo apt install upx -y
        continue-on-error: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOPATH: "/home/runner/go"
