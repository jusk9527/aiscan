version: "2"
run:
  modules-download-mode: readonly
linters:
  default: none
  enable:
    - bodyclose
    - durationcheck
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - staticcheck
    - unused
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - io.Close
        - (*os/exec.Cmd).Process.Kill
        - (*os.File).Close
        - (io.Closer).Close
    gosec:
      excludes:
        - G104
        - G304
        - G204
        - G301
        - G302
        - G306
        - G703
      confidence: medium
    govet:
      disable:
        - fieldalignment
        - shadow
      enable-all: true
    misspell:
      locale: US
    staticcheck:
      checks:
        - all
        - -QF1001
        - -QF1012
        - -ST1000
        - -ST1003
        - -ST1005
        - -ST1016
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test\.go
      - linters:
          - errcheck
        path: pkg/command/bash\.go
        text: Error return value of.*Kill|Signal|Close
    paths:
      - template\.go$
      - vendor
      - templates
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
